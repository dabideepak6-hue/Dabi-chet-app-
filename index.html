<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DEEPAK DABI LIVE LOCATION TRACKER</title>

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:15px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#1e293b;
      border-radius:20px;
      padding:20px;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    .logo{
      text-align:center;
      font-size:28px;
      font-weight:bold;
      color:#38bdf8;
      margin-bottom:20px;
    }

    .card{
      background:#334155;
      padding:15px;
      border-radius:15px;
      margin-bottom:15px;
    }

    .title{
      font-size:18px;
      margin-bottom:10px;
      color:#38bdf8;
      font-weight:bold;
    }

    .info{
      line-height:2;
      font-size:15px;
      word-break:break-word;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    .trackBtn{
      background:#38bdf8;
      color:black;
    }

    .shareBtn{
      background:#22c55e;
      color:white;
    }

    .status{
      text-align:center;
      margin-top:15px;
      font-size:15px;
      color:#22c55e;
      font-weight:bold;
    }

    #map{
      width:100%;
      height:300px;
      border-radius:15px;
      margin-top:15px;
      overflow:hidden;
    }

    a{
      color:#38bdf8;
      text-decoration:none;
    }

    .footer{
      text-align:center;
      margin-top:20px;
      font-size:12px;
      color:#94a3b8;
    }

    @media(max-width:480px){

      .logo{
        font-size:22px;
      }

      .title{
        font-size:16px;
      }

      .info{
        font-size:14px;
      }

      button{
        font-size:15px;
      }

      #map{
        height:250px;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    📍 DEEPAK DABI LIVE TRACKER
  </div>

  <div class="card">

    <div class="title">
      Current Location
    </div>

    <div class="info">

      <p>
        <strong>Latitude:</strong>
        <span id="lat">--</span>
      </p>

      <p>
        <strong>Longitude:</strong>
        <span id="lon">--</span>
      </p>

      <p>
        <strong>Accuracy:</strong>
        <span id="accuracy">--</span>
      </p>

      <p>
        <strong>Google Maps:</strong>
        <a href="#" id="mapLink" target="_blank">
          Open Location
        </a>
      </p>

    </div>

  </div>

  <button class="trackBtn"
    onclick="getLocation()">
    Allow Location Access
  </button>

  <button class="shareBtn"
    onclick="shareLocation()">
    Share Location
  </button>

  <div class="status" id="status">
    Waiting For Permission...
  </div>

  <div id="map"></div>

  <div class="footer">
    © 2026 Deepak Dabi Location Tracker
  </div>

</div>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>

  let map = L.map('map').setView([20.5937,78.9629],5);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:'© OpenStreetMap'
    }
  ).addTo(map);

  let marker;
  let currentLat = "";
  let currentLon = "";

  function getLocation(){

    const status =
      document.getElementById("status");

    if(navigator.geolocation){

      status.innerHTML =
        "Requesting Location Permission...";

      navigator.geolocation.watchPosition(
        showPosition,
        showError,
        {
          enableHighAccuracy:true,
          timeout:10000,
          maximumAge:0
        }
      );

    }else{

      status.innerHTML =
        "Geolocation Not Supported";

    }

  }

  function showPosition(position){

    currentLat =
      position.coords.latitude;

    currentLon =
      position.coords.longitude;

    const accuracy =
      position.coords.accuracy;

    document.getElementById("lat")
      .innerHTML = currentLat;

    document.getElementById("lon")
      .innerHTML = currentLon;

    document.getElementById("accuracy")
      .innerHTML = accuracy + " meters";

    document.getElementById("status")
      .innerHTML =
      "Live Tracking Active ✅";

    const googleURL =
      `https://www.google.com/maps?q=${currentLat},${currentLon}`;

    document.getElementById("mapLink")
      .href = googleURL;

    map.setView([currentLat,currentLon],16);

    if(marker){

      marker.setLatLng(
        [currentLat,currentLon]
      );

    }else{

      marker = L.marker(
        [currentLat,currentLon]
      ).addTo(map)
      .bindPopup("📍 You Are Here")
      .openPopup();

    }

  }

  function showError(error){

    const status =
      document.getElementById("status");

    switch(error.code){

      case error.PERMISSION_DENIED:
        status.innerHTML =
          "❌ Permission Denied";
      break;

      case error.POSITION_UNAVAILABLE:
        status.innerHTML =
          "❌ Location Unavailable";
      break;

      case error.TIMEOUT:
        status.innerHTML =
          "⏳ Request Timeout";
      break;

      default:
        status.innerHTML =
          "❌ Unknown Error";

    }

  }

  function shareLocation(){

    if(currentLat === ""){

      alert(
        "Please Allow Location First"
      );

      return;

    }

    const shareURL =
      `https://www.google.com/maps?q=${currentLat},${currentLon}`;

    if(navigator.share){

      navigator.share({

        title:
          "DEEPAK DABI LIVE LOCATION",

        text:
          "Track My Live Location",

        url:
          shareURL

      });

    }else{

      navigator.clipboard
        .writeText(shareURL);

      alert(
        "Location Link Copied"
      );

    }

  }

</script>

</body>
</html>
