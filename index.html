<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
DEEPAK DABI LIVE LOCATION TRACKER
</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:15px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:550px;
background:#1e293b;
border-radius:20px;
padding:20px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.logo{
text-align:center;
font-size:24px;
font-weight:bold;
color:#38bdf8;
margin-bottom:20px;
line-height:1.6;
}

.card{
background:#334155;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

.title{
color:#38bdf8;
font-size:18px;
margin-bottom:10px;
font-weight:bold;
}

.info{
line-height:2;
font-size:15px;
word-break:break-word;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.trackBtn{
background:#38bdf8;
color:black;
}

.shareBtn{
background:#22c55e;
color:white;
}

.status{
text-align:center;
margin-top:15px;
color:#22c55e;
font-weight:bold;
font-size:15px;
}

#map{
width:100%;
height:300px;
border-radius:15px;
overflow:hidden;
margin-top:15px;
}

.mapImage{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
margin-top:15px;
border:2px solid #38bdf8;
}

iframe{
width:100%;
height:300px;
border:none;
border-radius:15px;
margin-top:10px;
}

a{
color:#38bdf8;
text-decoration:none;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#94a3b8;
}

@media(max-width:480px){

.logo{
font-size:20px;
}

#map{
height:250px;
}

iframe{
height:250px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

★彡 𝘿𝙀𝙀𝙋𝘼𝙆 𝘿𝘼𝘽𝙄 彡★
<br>
📍 LIVE LOCATION TRACKER

</div>

<!-- SEARCH LOCATION -->

<div class="card">

<div class="title">
Search Location
</div>

<input
type="text"
id="searchInput"
placeholder="Search Any Location...">

<button
class="trackBtn"
onclick="searchLocation()">

Search Location

</button>

</div>

<!-- LOCATION INFO -->

<div class="card">

<div class="title">
Current Location
</div>

<div class="info">

<p>
<strong>Latitude:</strong>
<span id="lat">--</span>
</p>

<p>
<strong>Longitude:</strong>
<span id="lon">--</span>
</p>

<p>
<strong>Accuracy:</strong>
<span id="accuracy">--</span>
</p>

<p>

<strong>Google Maps:</strong>

<a href="#"
id="mapLink"
target="_blank">

Open Location

</a>

</p>

</div>

</div>

<!-- BUTTONS -->

<button class="trackBtn"
onclick="getLocation()">

Allow Location Access

</button>

<button class="shareBtn"
onclick="shareLocation()">

Share Location

</button>

<!-- STATUS -->

<div class="status"
id="status">

Waiting For Permission...

</div>

<!-- LIVE MAP -->

<div id="map"></div>

<!-- MAP PREVIEW -->

<img
id="mapImage"
class="mapImage"

src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Map_marker.svg/1200px-Map_marker.svg.png"

alt="Map Preview">

<!-- 360 VIEW -->

<div class="card">

<div class="title">
360° Street View
</div>

<iframe
id="streetView"
loading="lazy"
allowfullscreen>
</iframe>

</div>

<div class="footer">

© 2026 Deepak Dabi Live Tracker

</div>

</div>

<script src=
"https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>

let map = L.map('map')
.setView([20.5937,78.9629],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

let marker;

let currentLat = "";
let currentLon = "";

let lastLat = null;
let lastLon = null;

function getLocation(){

const status =
document.getElementById("status");

if(navigator.geolocation){

status.innerHTML =
"Requesting Permission...";

navigator.geolocation.watchPosition(

showPosition,

showError,

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

}else{

status.innerHTML =
"Geolocation Not Supported";

}

}

function showPosition(position){

currentLat =
position.coords.latitude;

currentLon =
position.coords.longitude;

const accuracy =
position.coords.accuracy;

document.getElementById("lat")
.innerHTML = currentLat;

document.getElementById("lon")
.innerHTML = currentLon;

document.getElementById("accuracy")
.innerHTML =
accuracy + " meters";

document.getElementById("status")
.innerHTML =
"Live Tracking Active ✅";

const googleURL =

`https://www.google.com/maps?q=${currentLat},${currentLon}`;

document.getElementById("mapLink")
.href = googleURL;

map.setView(
[currentLat,currentLon],
16
);

if(marker){

marker.setLatLng(
[currentLat,currentLon]
);

}else{

marker = L.marker(
[currentLat,currentLon]
)

.addTo(map)

.bindPopup("📍 You Are Here")

.openPopup();

}

if(
lastLat !== currentLat ||
lastLon !== currentLon
){

document.getElementById("mapImage")
.src =

`https://maps.locationiq.com/v3/staticmap?key=pk.demo&center=${currentLat},${currentLon}&zoom=15&size=600x300&markers=icon:large-red-cutout|${currentLat},${currentLon}`;

lastLat = currentLat;
lastLon = currentLon;

}

document.getElementById("streetView")
.src =

`https://www.google.com/maps?q=&layer=c&cbll=${currentLat},${currentLon}&cbp=11,0,0,0,0&output=svembed`;

}

function showError(error){

const status =
document.getElementById("status");

switch(error.code){

case error.PERMISSION_DENIED:

status.innerHTML =
"❌ Permission Denied";

break;

case error.POSITION_UNAVAILABLE:

status.innerHTML =
"❌ Location Unavailable";

break;

case error.TIMEOUT:

status.innerHTML =
"⏳ Request Timeout";

break;

default:

status.innerHTML =
"❌ Unknown Error";

}

}

function shareLocation(){

if(currentLat === ""){

alert(
"Please Allow Location First"
);

return;

}

const shareURL =

`https://www.google.com/maps?q=${currentLat},${currentLon}`;

if(navigator.share){

navigator.share({

title:
"DEEPAK DABI LIVE LOCATION",

text:
"Track My Live Location",

url:
shareURL

});

}else{

navigator.clipboard
.writeText(shareURL);

alert(
"Location Link Copied"
);

}

}

async function searchLocation(){

const query =
document.getElementById("searchInput")
.value.trim();

if(query === ""){

alert("Please Enter Location");

return;

}

document.getElementById("status")
.innerHTML =
"Searching Location...";

try{

const response = await fetch(

`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=in&q=${encodeURIComponent(query)}`

);

const data = await response.json();

if(data.length === 0){

alert("Location Not Found");

document.getElementById("status")
.innerHTML =
"❌ Location Not Found";

return;

}

const lat =
parseFloat(data[0].lat);

const lon =
parseFloat(data[0].lon);

map.setView([lat,lon],16);

if(marker){

marker.setLatLng([lat,lon]);

}else{

marker = L.marker([lat,lon])
.addTo(map);

}

marker.bindPopup(data[0].display_name)
.openPopup();

document.getElementById("lat")
.innerHTML = lat;

document.getElementById("lon")
.innerHTML = lon;

document.getElementById("accuracy")
.innerHTML = "Search Result";

document.getElementById("mapLink")
.href =
`https://www.google.com/maps?q=${lat},${lon}`;

document.getElementById("mapImage")
.src =

`https://maps.locationiq.com/v3/staticmap?key=pk.demo&center=${lat},${lon}&zoom=16&size=600x300&markers=icon:large-red-cutout|${lat},${lon}`;

document.getElementById("streetView")
.src =

`https://www.google.com/maps?q=&layer=c&cbll=${lat},${lon}&cbp=11,0,0,0,0&output=svembed`;

document.getElementById("status")
.innerHTML =
"✅ Location Found";

}catch(error){

document.getElementById("status")
.innerHTML =
"❌ Search Error";

alert("Search Failed");

}

}

</script>

</body>

</html>
