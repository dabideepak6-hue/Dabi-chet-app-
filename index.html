<!DOCTYPE html>
<html>
<head>
  <title>Pro Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f0f2f5; }

    #login {
      height:100vh; display:flex; justify-content:center; align-items:center;
    }

    .login-box {
      background:white; padding:25px; border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      width:300px; text-align:center;
    }

    input {
      width:90%; padding:10px; margin:5px;
      border-radius:6px; border:1px solid #ccc;
    }

    button {
      padding:10px; background:#075e54; color:white;
      border:none; border-radius:6px; margin:5px; cursor:pointer;
    }

    #app { display:none; height:100vh; display:flex; }

    #sidebar {
      width:30%; background:white; border-right:1px solid #ddd;
      overflow:auto;
    }

    #sidebar h3 {
      background:#075e54; color:white; margin:0; padding:10px;
    }

    #users button {
      width:100%; padding:10px; border:none;
      background:none; text-align:left; border-bottom:1px solid #eee;
    }

    #chat { width:70%; display:flex; flex-direction:column; }

    #chat-header {
      background:#075e54; color:white; padding:10px;
    }

    #messages {
      flex:1; overflow:auto; padding:10px; background:#ece5dd;
    }

    .msg { padding:8px; margin:5px; border-radius:8px; max-width:60%; }

    .me { background:#dcf8c6; margin-left:auto; }
    .other { background:white; }

    img { max-width:120px; display:block; margin-top:5px; }

    #inputBox { display:flex; padding:10px; background:#f0f0f0; }
    #inputBox input { flex:1; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Pro Chat</h2>

    <input id="phone" placeholder="+91XXXXXXXXXX">
    <div id="recaptcha-container"></div>
    <button onclick="sendOTP()">Send OTP</button>

    <input id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div id="sidebar">
    <h3>Chats</h3>
    <div id="users"></div>
  </div>

  <div id="chat">
    <div id="chat-header">Select a user</div>

    <div id="messages"></div>

    <div id="inputBox">
      <input id="message" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>

    <input type="file" id="imageInput">
    <button onclick="sendImage()">Send Image</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCx6dPa7cUXJ-eoz4jPZHS8WmE2BtHHggo",
  authDomain: "dabi-chet-app.firebaseapp.com",
  databaseURL: "https://dabi-chet-app-default-rtdb.firebaseio.com",
  projectId: "dabi-chet-app",
  storageBucket: "dabi-chet-app.firebasestorage.app",
  messagingSenderId: "655881204977",
  appId: "1:655881204977:web:d09bf1feb1b3feb7d26550"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const storage = getStorage(app);

let currentUser = "";
let chatId = "";

// Recaptcha
window.recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {}, auth);

// Send OTP
window.sendOTP = function () {
  let phone = document.getElementById("phone").value;

  signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
    .then(res => {
      window.confirmationResult = res;
      alert("OTP Sent");
    })
    .catch(err => alert(err.message));
};

// Verify OTP
window.verifyOTP = function () {
  let code = document.getElementById("otp").value;

  confirmationResult.confirm(code).then(res => {
    currentUser = res.user.phoneNumber;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";

    let uid = currentUser.replace("+","");

    set(ref(db, "users/" + uid), { phone: currentUser });

    set(ref(db, "status/" + uid), { online:true, lastSeen:Date.now() });

    window.addEventListener("beforeunload", () => {
      set(ref(db, "status/" + uid), { online:false, lastSeen:Date.now() });
    });

    loadUsers();
  }).catch(() => alert("Wrong OTP"));
};

// Load users
function loadUsers() {
  onValue(ref(db, "users"), snap => {
    let div = document.getElementById("users");
    div.innerHTML = "";

    snap.forEach(c => {
      let user = c.val().phone;
      let id = user.replace("+","");

      if (user !== currentUser) {
        let btn = document.createElement("button");

        onValue(ref(db, "status/"+id), s => {
          let d = s.val();
          btn.innerText = d && d.online ? user+" 🟢" : user;
        });

        btn.onclick = () => openChat(user);
        div.appendChild(btn);
      }
    });
  });
}

// Open chat
function openChat(other) {
  let u1 = currentUser.replace("+","");
  let u2 = other.replace("+","");
  chatId = u1 < u2 ? u1+"_"+u2 : u2+"_"+u1;

  document.getElementById("messages").innerHTML = "";

  onChildAdded(ref(db, "chats/"+chatId), snap => {
    let d = snap.val();

    if (d.user !== currentUser) {
      set(ref(db, "chats/"+chatId+"/"+snap.key+"/status"), "seen");
    }

    showMessage(d);
  });
}

// Send text
window.sendMessage = function () {
  let msg = document.getElementById("message").value;
  if (!msg || !chatId) return;

  push(ref(db, "chats/"+chatId), {
    user: currentUser,
    text: msg,
    status:"sent"
  });

  document.getElementById("message").value = "";
};

// Send image
window.sendImage = function () {
  let file = document.getElementById("imageInput").files[0];
  if (!file || !chatId) return;

  let fileRef = sRef(storage, "img/"+Date.now());

  uploadBytes(fileRef, file).then(() => {
    getDownloadURL(fileRef).then(url => {
      push(ref(db, "chats/"+chatId), {
        user: currentUser,
        image: url,
        status:"sent"
      });
    });
  });
};

// Show message
function showMessage(d) {
  let div = document.createElement("div");
  div.classList.add("msg");

  if (d.user === currentUser) div.classList.add("me");
  else div.classList.add("other");

  let text = d.text || "";

  if (d.user === currentUser) {
    if (d.status==="sent") text+=" ✔";
    if (d.status==="seen") text+=" ✔✔";
  }

  div.innerText = text;

  if (d.image) {
    let img = document.createElement("img");
    img.src = d.image;
    div.appendChild(img);
  }

  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
