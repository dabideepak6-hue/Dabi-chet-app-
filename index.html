<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DEEPAK DABI LOCATION TRACKER</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      text-align:center;
    }

    .container{
      width:95%;
      max-width:1000px;
      margin:20px auto;
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
      color:#38bdf8;
      margin-bottom:20px;
      font-size:32px;
    }

    button{
      padding:12px 22px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:black;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin:10px;
    }

    button:hover{
      background:#0ea5e9;
    }

    #map{
      height:500px;
      width:100%;
      margin-top:20px;
      border-radius:12px;
    }

    .info{
      margin-top:20px;
      font-size:18px;
      line-height:2;
    }

    .status{
      margin-top:15px;
      font-size:18px;
      color:#22c55e;
      font-weight:bold;
    }

    a{
      color:#38bdf8;
      text-decoration:none;
    }

    .footer{
      margin-top:20px;
      color:#94a3b8;
      font-size:14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>📍 DEEPAK DABI LOCATION TRACKER</h1>

    <button onclick="getLocation()">
      Allow Location Access
    </button>

    <button onclick="shareLocation()">
      Share Location
    </button>

    <div class="status" id="status">
      Waiting for permission...
    </div>

    <div class="info">
      <p><strong>Latitude:</strong> <span id="lat">--</span></p>

      <p><strong>Longitude:</strong> <span id="lon">--</span></p>

      <p><strong>Accuracy:</strong> <span id="accuracy">--</span></p>

      <p>
        <strong>Google Maps:</strong>
        <a id="mapLink" href="#" target="_blank">
          Open Location
        </a>
      </p>
    </div>

    <div id="map"></div>

    <div class="footer">
      © 2026 Deepak Dabi Location Tracker
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>

    let map = L.map('map').setView([20.5937, 78.9629], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let marker;
    let currentLat = "";
    let currentLon = "";

    function getLocation(){

      const status = document.getElementById("status");

      if(navigator.geolocation){

        status.innerHTML = "Requesting Location Permission...";

        navigator.geolocation.watchPosition(
          showPosition,
          showError,
          {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
          }
        );

      }else{
        status.innerHTML = "Geolocation not supported.";
      }
    }

    function showPosition(position){

      currentLat = position.coords.latitude;
      currentLon = position.coords.longitude;

      const accuracy = position.coords.accuracy;

      document.getElementById("lat").innerHTML = currentLat;
      document.getElementById("lon").innerHTML = currentLon;
      document.getElementById("accuracy").innerHTML = accuracy + " meters";

      document.getElementById("status").innerHTML =
        "Live Location Tracking Active ✅";

      const googleURL =
        `https://www.google.com/maps?q=${currentLat},${currentLon}`;

      document.getElementById("mapLink").href = googleURL;

      map.setView([currentLat,currentLon],16);

      if(marker){
        marker.setLatLng([currentLat,currentLon]);
      }else{
        marker = L.marker([currentLat,currentLon])
          .addTo(map)
          .bindPopup("📍 You Are Here")
          .openPopup();
      }
    }

    function showError(error){

      const status = document.getElementById("status");

      switch(error.code){

        case error.PERMISSION_DENIED:
          status.innerHTML =
            "❌ Location Permission Denied";
          break;

        case error.POSITION_UNAVAILABLE:
          status.innerHTML =
            "❌ Location Unavailable";
          break;

        case error.TIMEOUT:
          status.innerHTML =
            "⏳ Request Timeout";
          break;

        default:
          status.innerHTML =
            "❌ Unknown Error";
      }
    }

    function shareLocation(){

      if(currentLat === ""){
        alert("Please Allow Location First");
        return;
      }

      const shareURL =
        `https://www.google.com/maps?q=${currentLat},${currentLon}`;

      if(navigator.share){

        navigator.share({
          title:"DEEPAK DABI LOCATION",
          text:"Track My Live Location",
          url:shareURL
        });

      }else{

        navigator.clipboard.writeText(shareURL);

        alert("Location Link Copied");
      }
    }

  </script>

</body>
</html>
